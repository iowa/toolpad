services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toolpad
    ports:
      - '5433:5432'
    volumes:
      - ./docker/database/pg-init:/docker-entrypoint-initdb.d:ro
      - toolpad-db-data:/var/lib/postgresql/data # persist data even if container shuts down
    networks:
      - toolpad-network

volumes:
  toolpad-db-data:
networks:
  toolpad-network:
    name: toolpad-network
